services:
  postgres:
    image: postgres:16
    container_name: crm_postgres
    restart: always
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
      POSTGRES_DB: crm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: crm_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  n8n:
    image: n8nio/n8n
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: neglector-shrimp-shredder.ngrok-free.dev
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://neglector-shrimp-shredder.ngrok-free.dev
      N8N_EDITOR_BASE_URL: https://neglector-shrimp-shredder.ngrok-free.dev
      GENERIC_TIMEZONE: Africa/Cairo
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  redis_data:
  n8n_data: